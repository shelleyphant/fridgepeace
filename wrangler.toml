name = "fridgepeace"
main = "worker.js"
compatibility_date = "2026-05-30"

[assets]
directory = "build"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1